import re
import urllib.request
import idna
import time
from datetime import datetime

SOURCES = {
    "AdGuard DNS Filter": "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt",
    "HaGeZi Normal": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_34.txt",
    "AdAway": "https://adaway.org/hosts.txt",
    "OISD Big": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_27.txt",
    "Dan Pollock": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_4.txt",
    "Peter Lowe": "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=adblock",
    "Dandelion Sprout": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_39.txt",

    "EasyList": "https://easylist.to/easylist/easylist.txt",
    "EasyPrivacy": "https://easylist.to/easylist/easyprivacy.txt",

    "uBO Ads": "https://ublockorigin.github.io/uAssets/filters/filters.txt",
    "uBO Privacy": "https://ublockorigin.github.io/uAssets/filters/privacy.txt",
    "uBO Badware": "https://ublockorigin.github.io/uAssets/filters/badware.txt",
    "uBO Quick Fixes": "https://ublockorigin.github.io/uAssets/filters/quick-fixes.txt",
    "uBO Unbreak": "https://ublockorigin.github.io/uAssets/filters/unbreak.txt",
    "uBO Resource Abuse": "https://ublockorigin.github.io/uAssets/filters/resource-abuse.txt",
}

def fetch(url):
    req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
    return urllib.request.urlopen(req, timeout=30).read().decode("utf-8", errors="ignore")

def normalize(domain):
    domain = domain.lower().strip().rstrip(".")
    for sep in ["^", "$", "|", ",", " "]:
        domain = domain.split(sep)[0]
    if ":" in domain:
        domain = domain.split(":")[0]
    try:
        domain = idna.encode(domain).decode("ascii")
    except:
        pass
    return domain

def extract_domain(line):
    line = line.strip()

    if line.startswith("0.0.0.0 ") or line.startswith("127.0.0.1 "):
        parts = line.split()
        return parts[1] if len(parts) > 1 else None

    if line.startswith("||"):
        return line[2:].split("^")[0]

    return None


# -------------------------
# CORE STORAGE
# -------------------------
domains = set()
domain_sources = {}  # THIS IS THE KEY FIX

def add(domain, source):
    domain = normalize(domain)

    if not domain or "*" in domain or "/" in domain or "." not in domain:
        return False

    domains.add(domain)

    if domain not in domain_sources:
        domain_sources[domain] = set()

    domain_sources[domain].add(source)

    return True


def process():
    stats = {}

    for name, url in SOURCES.items():
        print(f"Downloading {name}")
        text = fetch(url)

        count = 0

        for line in text.splitlines():
            if not line or line.startswith(("!", "#")):
                continue

            domain = extract_domain(line)
            if not domain:
                continue

            if add(domain, name):
                count += 1

        stats[name] = count

    return stats


stats = process()

sorted_domains = sorted(domains)

# -------------------------
# WRITE MAIN LIST (WITH SOURCES INLINE)
# -------------------------
with open("DNSZeroList.txt", "w", encoding="utf-8") as f:
    f.write("! DNSZeroList (FULL)\n")
    f.write(f"! Generated: {datetime.utcnow().isoformat()}Z\n")
    f.write(f"! Unique Domains: {len(sorted_domains)}\n\n")

    for d in sorted_domains:
        sources = ", ".join(sorted(domain_sources.get(d, [])))

        # AdGuard-safe comment format
        f.write(f"||{d}^    ! {sources}\n")


# -------------------------
# STATS
# -------------------------
with open("stats.md", "w", encoding="utf-8") as f:
    f.write("# Blocklist Stats\n\n")
    for k, v in stats.items():
        f.write(f"- {k}: {v:,}\n")

print(f"DONE: {len(sorted_domains)} domains")
