name: Build blocklist

on:
  schedule:
    # Every 12 hours (00:00 and 12:00 UTC). Cron times are UTC only.
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - build.py
      - .github/workflows/update-blocklist.yml

permissions:
  contents: write

concurrency:
  group: update-blocklist
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build unified blocklist
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DNSZeroList.txt DNSZeroList_no_oisd.txt stats.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update blocklists ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
