name: Update Master DNS Blocklist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install idna

      - name: Build combined blocklist
        run: |
          cat > build.py << 'EOF'
          import re
          import urllib.request
          import idna
          import time
          from datetime import datetime

          SOURCES = {
              "AdGuard DNS Filter": "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt",
              "HaGeZi Normal": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_34.txt",
              "AdAway": "https://adaway.org/hosts.txt",
              "OISD Big": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_27.txt",
              "Dan Pollock": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_4.txt",
              "Peter Lowe": "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=adblock",
              "Dandelion Sprout": "https://adguardteam.github.io/HostlistsRegistry/assets/filter_39.txt",

              "EasyList": "https://easylist.to/easylist/easylist.txt",
              "EasyPrivacy": "https://easylist.to/easylist/easyprivacy.txt",

              "uBO Ads": "https://ublockorigin.github.io/uAssets/filters/filters.txt",
              "uBO Privacy": "https://ublockorigin.github.io/uAssets/filters/privacy.txt",
              "uBO Badware": "https://ublockorigin.github.io/uAssets/filters/badware.txt",
              "uBO Quick Fixes": "https://ublockorigin.github.io/uAssets/filters/quick-fixes.txt",
              "uBO Unbreak": "https://ublockorigin.github.io/uAssets/filters/unbreak.txt",
              "uBO Resource Abuse": "https://ublockorigin.github.io/uAssets/filters/resource-abuse.txt",
          }

          DOMAIN_RE = re.compile(
              r"^(?=.{1,253}$)(?!-)[a-z0-9.-]+(?<!-)$",
              re.IGNORECASE
          )

          def fetch(url, retries=3):
              for i in range(retries):
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={"User-Agent": "Mozilla/5.0"}
                      )
                      return urllib.request.urlopen(req, timeout=30).read().decode("utf-8", errors="ignore")
                  except Exception:
                      if i == retries - 1:
                          raise
                      time.sleep(2)

          def normalize(domain: str) -> str:
              domain = domain.lower().strip().rstrip(".")

              for sep in ["^", "$", "|", ",", " "]:
                  domain = domain.split(sep)[0]

              if ":" in domain:
                  domain = domain.split(":")[0]

              try:
                  domain = idna.encode(domain).decode("ascii")
              except Exception:
                  pass

              return domain

          # -------------------------------------------------------
          # STRICT PARSER (NO GUESSING = FIX FOR YOUR BREAKAGE)
          # -------------------------------------------------------
          def extract_domain(line: str):
              line = line.strip()

              # hosts format ONLY
              if line.startswith("0.0.0.0 ") or line.startswith("127.0.0.1 "):
                  parts = line.split()
                  if len(parts) >= 2:
                      return parts[1]
                  return None

              # uBO / AdGuard network rule ONLY
              if line.startswith("||"):
                  return line[2:].split("^")[0]

              # EVERYTHING ELSE IS INVALID
              return None

          def add_domain(domain: str, target_set: set) -> bool:
              domain = normalize(domain)

              if not domain:
                  return False
              if "*" in domain:
                  return False
              if "/" in domain:
                  return False
              if "." not in domain:
                  return False
              if not DOMAIN_RE.match(domain):
                  return False

              target_set.add(domain)
              return True

          def process_sources(exclude_oisd=False):
              domains = set()
              stats = {}

              for name, url in SOURCES.items():
                  if exclude_oisd and name == "OISD Big":
                      continue

                  print(f"Downloading {name}")
                  text = fetch(url)

                  count = 0

                  for line in text.splitlines():
                      if not line or line.startswith(("!", "#")):
                          continue

                      domain = extract_domain(line)
                      if not domain:
                          continue

                      if add_domain(domain, domains):
                          count += 1

                  stats[name] = count

              return domains, stats

          # -------------------------
          # BUILD FULL
          # -------------------------
          full_domains, full_stats = process_sources(exclude_oisd=False)
          full_sorted = sorted(full_domains)

          # -------------------------
          # BUILD NO OISD
          # -------------------------
          no_oisd_domains, no_oisd_stats = process_sources(exclude_oisd=True)
          no_oisd_sorted = sorted(no_oisd_domains)

          # -------------------------
          # WRITE FULL LIST
          # -------------------------
          with open("DNSZeroList.txt", "w", encoding="utf-8") as f:
              f.write("! DNSZeroList (FULL)\n")
              f.write(f"! Generated: {datetime.utcnow().isoformat()}Z\n")
              f.write(f"! Unique Domains: {len(full_sorted)}\n\n")
              for d in full_sorted:
                  f.write(f"||{d}^\n")

          # -------------------------
          # WRITE NO OISD LIST
          # -------------------------
          with open("DNSZeroList_no_oisd.txt", "w", encoding="utf-8") as f:
              f.write("! DNSZeroList (NO OISD)\n")
              f.write(f"! Generated: {datetime.utcnow().isoformat()}Z\n")
              f.write(f"! Unique Domains: {len(no_oisd_sorted)}\n\n")
              for d in no_oisd_sorted:
                  f.write(f"||{d}^\n")

          # -------------------------
          # STATS
          # -------------------------
          with open("stats.md", "w", encoding="utf-8") as f:
              f.write("# Blocklist Statistics\n\n")
              for name, count in full_stats.items():
                  f.write(f"- {name}: {count:,}\n")

              f.write(f"\n## FULL: {len(full_sorted):,}\n")
              f.write(f"## NO OISD: {len(no_oisd_sorted):,}\n")

          print(f"FULL: {len(full_sorted):,} | NO OISD: {len(no_oisd_sorted):,}")
          EOF

          python build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add DNSZeroList.txt DNSZeroList_no_oisd.txt stats.md

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update DNSZeroList (strict DNS-safe parser fix)"
            git push
          fi
